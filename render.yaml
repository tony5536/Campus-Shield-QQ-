# Minimal Render service manifest for CampusShield AI
services:
  - type: web
    name: campusshield-backend
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CS_SECRET_KEY
        value: ""
      - key: DATABASE_URL
        value: "sqlite:///./backend.db"
